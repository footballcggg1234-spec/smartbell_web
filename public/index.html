<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SmartBell - Control Center</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-center: #ffffff; --bg-edge: #f59e0b;
            --glass-base: rgba(255, 255, 255, 0.4); --glass-card: rgba(255, 255, 255, 0.6);
            --glass-hover: rgba(255, 255, 255, 0.85); --glass-solid: rgba(255, 255, 255, 0.95);
            --border-light: rgba(255, 255, 255, 0.7); --border-highlight: rgba(255, 255, 255, 1);
            --primary: #d97706; --primary-grad: linear-gradient(135deg, #f59e0b, #d97706);
            --primary-light: rgba(245, 158, 11, 0.15);
            --text-main: #1c1917; --text-muted: #57534e; 
            --danger: #ef4444; --danger-light: rgba(239, 68, 68, 0.15); --success: #10b981;
            --radius-xl: 32px; --radius-lg: 24px; --radius-md: 16px;
            --shadow-glass: 0 8px 32px rgba(0, 0, 0, 0.04), inset 0 1px 1px rgba(255, 255, 255, 0.8);
            --shadow-hover: 0 16px 40px rgba(217, 119, 6, 0.12), inset 0 1px 1px rgba(255, 255, 255, 1);
            --shadow-btn: 0 10px 25px rgba(217, 119, 6, 0.3);
        }

        [data-theme="dark"] {
            --bg-center: #451a03; --bg-edge: #0c0a09;
            --glass-base: rgba(20, 20, 20, 0.4); --glass-card: rgba(30, 30, 30, 0.5);
            --glass-hover: rgba(45, 45, 45, 0.7); --glass-solid: rgba(20, 20, 20, 0.95);
            --border-light: rgba(255, 255, 255, 0.05); --border-highlight: rgba(255, 255, 255, 0.15);
            --primary: #fbbf24; --primary-grad: linear-gradient(135deg, #fbbf24, #d97706);
            --primary-light: rgba(245, 158, 11, 0.2);
            --text-main: #f5f5f4; --text-muted: #a8a29e; 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Kanit', sans-serif; -webkit-tap-highlight-color: transparent; transition: background-color 0.4s, border-color 0.4s, color 0.4s, box-shadow 0.4s; }
        body { background-color: var(--bg-edge); color: var(--text-main); width: 100vw; height: 100vh; overflow: hidden; display: flex; position: relative; }
        .amber-bg { position: absolute; inset: 0; z-index: 0; background-image: radial-gradient(125% 125% at 50% 10%, var(--bg-center) 40%, var(--bg-edge) 100%); background-size: 100% 100%; }

        /* Login Card */
        #login-wrapper { position: fixed; inset: 0; z-index: 9999; display: flex; justify-content: center; align-items: center; transition: opacity 0.5s ease; padding: 20px; }
        #login-wrapper.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
        .login-card { background: var(--glass-card); backdrop-filter: blur(40px); border: 1px solid var(--border-highlight); border-radius: var(--radius-xl); padding: 40px; width: 100%; max-width: 420px; text-align: center; box-shadow: var(--shadow-hover); }
        .login-title { font-size: 26px; font-weight: 700; color: var(--text-main); margin-bottom: 5px; }
        .login-subtitle { font-size: 14px; color: var(--text-muted); font-weight: 500; margin-bottom: 25px; }
        .login-input { width: 100%; padding: 16px 20px; background: var(--glass-base); border: 1px solid var(--border-light); border-radius: 16px; outline: none; margin-bottom: 12px; font-size: 15px; color: var(--text-main); }
        .login-input:focus { border-color: var(--primary); background: var(--glass-solid); box-shadow: 0 0 0 4px var(--primary-light); }
        .login-btn { width: 100%; background: var(--primary-grad); color: white; border: none; padding: 16px; border-radius: 100px; font-weight: 600; font-size: 16px; cursor: pointer; margin-top: 10px; box-shadow: var(--shadow-btn); }
        .login-btn:hover { transform: translateY(-2px); box-shadow: 0 15px 30px rgba(217, 119, 6, 0.4); }
        .login-btn:disabled { opacity: 0.7; cursor: not-allowed; }
        .otp-btn { background: var(--glass-solid); color: var(--text-main); border: 1px solid var(--border-light); padding: 0 20px; border-radius: 16px; font-weight: 600; cursor: pointer; margin-bottom: 12px; }
        .toggle-auth { margin-top: 20px; font-size: 14px; color: var(--text-muted); }
        .toggle-auth a { color: var(--primary); font-weight: 600; cursor: pointer; text-decoration: none; }

        /* App Layout */
        #app-wrapper { position: relative; z-index: 1; display: flex; width: 100%; height: 100%; opacity: 0; visibility: hidden; transition: opacity 0.6s ease; }
        #app-wrapper.visible { opacity: 1; visibility: visible; }
        .sidebar { width: 280px; background: var(--glass-base); height: 100vh; display: flex; flex-direction: column; padding: 40px 24px; border-right: 1px solid var(--border-light); backdrop-filter: blur(40px); }
        .main-wrapper { flex-grow: 1; height: 100vh; overflow-y: auto; }
        .main-wrapper::-webkit-scrollbar { width: 8px; }
        .main-wrapper::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 4px; }

        .brand-logo { font-size: 24px; font-weight: 700; color: var(--text-main); margin-bottom: 50px; }
        .sidebar-nav { display: flex; flex-direction: column; gap: 8px; margin-bottom: auto; }
        .nav-item { display: flex; align-items: center; gap: 16px; padding: 16px 20px; border-radius: 20px; color: var(--text-muted); font-weight: 500; cursor: pointer; transition: 0.4s; border: 1px solid transparent; }
        .nav-item:hover { background: var(--glass-card); color: var(--primary); }
        .nav-item.active { background: var(--glass-solid); color: var(--primary); border-color: var(--border-highlight); }

        .page-container { padding: 50px 60px; display: none; }
        .page-container.active { display: block; }
        .section-title { font-size: 22px; font-weight: 700; color: var(--text-main); margin-bottom: 24px; }
        .device-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 24px; }
        .device-card { background: var(--glass-card); backdrop-filter: blur(30px); border-radius: var(--radius-xl); padding: 26px; box-shadow: var(--shadow-glass); border: 1px solid var(--border-light); transition: 0.4s; }
        .device-card:hover { transform: translateY(-4px); background: var(--glass-hover); }
        .device-card.active { border-color: var(--border-highlight); background: var(--glass-solid); }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(15px); display: flex; justify-content: center; align-items: center; opacity: 0; visibility: hidden; transition: 0.4s; z-index: 1000; }
        .modal-overlay.show { opacity: 1; visibility: visible; }
        .modal-content { background: var(--glass-solid); backdrop-filter: blur(40px); width: 100%; max-width: 440px; padding: 45px; border-radius: 40px; transform: scale(0.9); transition: 0.4s; border: 1px solid var(--border-light); }
        .modal-overlay.show .modal-content { transform: scale(1); }

        .toast { position: fixed; top: 40px; left: 50%; transform: translateX(-50%) translateY(-20px); background: rgba(28, 25, 23, 0.95); color: white; padding: 14px 28px; border-radius: 100px; font-size: 15px; font-weight: 500; z-index: 9999; opacity: 0; transition: 0.4s; }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        @media (max-width: 768px) {
            .sidebar { display: none; }
            .page-container { padding: 20px; }
            .device-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="amber-bg"></div>
    <div class="toast" id="toastMsg"></div>

    <!-- Login Screen -->
    <div id="login-wrapper">
        <div class="login-card">
            <h2 class="login-title">SmartBell Pro</h2>
            <p class="login-subtitle">ระบบควบคุมเสียงออดอัจฉริยะ</p>
            
            <form id="authForm">
                <input type="text" class="login-input" id="authUser" placeholder="ชื่อผู้ใช้งาน" required>
                
                <div id="registerFields" style="display: none;">
                    <input type="email" class="login-input" id="authEmail" placeholder="อีเมล" required>
                    <div style="display: flex; gap: 10px;">
                        <input type="text" class="login-input" id="authOtp" placeholder="รหัส OTP 6 หลัก" maxlength="6" style="flex: 1;">
                        <button type="button" class="otp-btn" id="btnSendOtp" onclick="sendOTP(event)">รับ OTP</button>
                    </div>
                </div>

                <input type="password" class="login-input" id="authPass" placeholder="รหัสผ่าน" required>
                <button type="submit" class="login-btn" id="authSubmitBtn">เข้าสู่ระบบ</button>
            </form>
            <p class="toggle-auth">
                <span id="authToggleText">ยังไม่มีบัญชี?</span> 
                <a onclick="toggleAuthMode()">สมัครสมาชิก</a>
            </p>
        </div>
    </div>

    <!-- App -->
    <div id="app-wrapper">
        <div class="sidebar">
            <div class="brand-logo">🔔 SmartBell</div>
            <div class="sidebar-nav">
                <div class="nav-item active" onclick="switchTab('page-home', this)"><i class="fa-solid fa-gauge"></i> Dashboard</div>
                <div class="nav-item" onclick="switchTab('page-schedules', this)"><i class="fa-solid fa-clock"></i> Schedules</div>
                <div class="nav-item" onclick="switchTab('page-settings', this)"><i class="fa-solid fa-sliders"></i> Settings</div>
            </div>
            <div style="padding: 20px; background: var(--glass-card); border-radius: 20px; text-align: center; border: 1px solid var(--border-light);">
                <div style="font-size: 16px; font-weight: 700; color: var(--text-main);" id="displayUser">User</div>
                <div style="font-size: 13px; color: var(--success); margin-top: 5px;"><i class="fa-solid fa-circle" style="font-size:8px;"></i> Online</div>
                <button onclick="handleLogout()" style="width: 100%; margin-top: 15px; padding: 10px; background: var(--danger-light); color: var(--danger); border: none; border-radius: 12px; cursor: pointer; font-weight: 600;">Logout</button>
            </div>
        </div>

        <div class="main-wrapper">
            <div class="page-container active" id="page-home">
                <h3 class="section-title">Quick Control</h3>
                <div class="device-grid">
                    <div class="device-card" style="cursor: pointer;" onclick="forcePlayBell('08.30.mp3')">
                        <div style="font-size: 32px; margin-bottom: 10px;">🔔</div>
                        <div style="font-weight: 600; color: var(--text-main);">Play Test Sound</div>
                    </div>
                    <div class="device-card" style="cursor: pointer;" onclick="stopBell()">
                        <div style="font-size: 32px; margin-bottom: 10px;">🛑</div>
                        <div style="font-weight: 600; color: var(--text-main);">Stop Sound</div>
                    </div>
                </div>
            </div>

            <div class="page-container" id="page-schedules">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
                    <h3 class="section-title" style="margin-bottom: 0;">Automations</h3>
                    <button class="login-btn" style="width: auto; margin-top: 0; padding: 10px 20px;" onclick="openModal()">+ Add Schedule</button>
                </div>
                <div class="device-grid" id="schedule-container"></div>
            </div>

            <div class="page-container" id="page-settings">
                <h3 class="section-title">Settings</h3>
                <div style="background: var(--glass-card); padding: 25px; border-radius: 20px; border: 1px solid var(--border-light);">
                    <div style="color: var(--text-muted);">Settings content here</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="addModal">
        <div class="modal-content">
            <h3 style="font-size: 24px; font-weight: 700; margin-bottom: 25px;">New Schedule</h3>
            <form id="scheduleForm">
                <input type="time" class="login-input" id="inputTime" required placeholder="Time">
                <input type="text" class="login-input" id="inputTitle" required placeholder="Title (e.g., Break Time)">
                <select class="login-input" id="inputAudio" style="margin-bottom: 25px;">
                    <option value="08.30.mp3">Morning Bell (08:30)</option>
                    <option value="12.00.mp3">Lunch Bell (12:00)</option>
                </select>
                <button type="submit" class="login-btn" style="width: 100%; padding: 16px;">Create</button>
            </form>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        // ⚠️ ตัวแปร Global
        // Line ~350 ในไฟล์ index.html
         const SERVER_URL = 'https://smartbell-web.onrender.com';
        let currentUser = null;
        let authToken = null;
        let socket = null;
        let isLoginMode = true;

        // ================= 🔐 Auth System =================
        function toggleAuthMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('authSubmitBtn').innerText = isLoginMode ? 'เข้าสู่ระบบ' : 'สมัครสมาชิก';
            document.getElementById('registerFields').style.display = isLoginMode ? 'none' : 'block';
        }

        async function sendOTP(e) {
            e.preventDefault();
            const user = document.getElementById('authUser').value;
            const email = document.getElementById('authEmail').value;
            if (!user || !email) return showToast('Please fill username and email');

            const btn = e.target;
            btn.disabled = true;
            btn.innerText = 'Sending...';

            try {
                const res = await fetch(`${SERVER_URL}/api/auth/send-otp`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, email })
                });
                const data = await res.json();
                showToast(data.message);

                if (data.success) {
                    let timer = 60;
                    const countdown = setInterval(() => {
                        btn.innerText = `Resend (${timer}s)`;
                        timer--;
                        if (timer < 0) {
                            clearInterval(countdown);
                            btn.innerText = 'Send OTP';
                            btn.disabled = false;
                        }
                    }, 1000);
                }
            } catch (err) {
                showToast('Failed to send OTP');
                btn.disabled = false;
                btn.innerText = 'Send OTP';
            }
        }

        document.getElementById('authForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const user = document.getElementById('authUser').value;
            const pass = document.getElementById('authPass').value;
            const email = document.getElementById('authEmail').value;
            const otp = document.getElementById('authOtp').value;

            const endpoint = isLoginMode ? '/api/auth/login' : '/api/auth/register';
            const payload = isLoginMode 
                ? { username: user, password: pass }
                : { username: user, email, password: pass, otp };

            const btn = document.getElementById('authSubmitBtn');
            btn.disabled = true;
            btn.innerText = '⏳ Processing...';

            try {
                const res = await fetch(`${SERVER_URL}${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await res.json();

                if (data.success) {
                    if (isLoginMode) {
                        authToken = data.token;
                        currentUser = data.user;
                        sessionStorage.setItem('token', authToken);
                        sessionStorage.setItem('user', JSON.stringify(currentUser));
                        showToast('Login successful!');
                        setTimeout(() => initApp(), 800);
                    } else {
                        showToast('Registration successful! Please login');
                        setTimeout(() => toggleAuthMode(), 1500);
                    }
                } else {
                    showToast(data.message);
                }
            } catch (err) {
                showToast('Server connection failed');
            } finally {
                btn.disabled = false;
                btn.innerText = isLoginMode ? 'เข้าสู่ระบบ' : 'สมัครสมาชิก';
            }
        });

        // ================= 🔌 App Initialization =================
        function initApp() {
            document.getElementById('login-wrapper').classList.add('hidden');
            document.getElementById('app-wrapper').classList.add('visible');
            document.getElementById('displayUser').innerText = currentUser.username;

            // Initialize Socket.io with token auth
            socket = io(SERVER_URL, {
                auth: { token: authToken },
                reconnection: true,
                reconnectionDelay: 1000,
                reconnectionAttempts: 5
            });

            socket.on('connect', () => {
                console.log('✅ Socket.io connected');
                showToast('Connected to server');
            });

            socket.on('schedule_updated', () => {
                console.log('📅 Schedules updated');
                fetchSchedules();
            });

            socket.on('disconnect', () => {
                console.log('❌ Socket.io disconnected');
            });

            socket.on('error', (error) => {
                console.error('Socket error:', error);
                showToast('Connection error: ' + error);
            });

            fetchSchedules();
        }

        // Check if already logged in
        document.addEventListener('DOMContentLoaded', () => {
            const token = sessionStorage.getItem('token');
            const user = sessionStorage.getItem('user');

            if (token && user) {
                authToken = token;
                currentUser = JSON.parse(user);
                initApp();
            }
        });

        // ================= 📅 Schedule Management =================
        async function fetchSchedules() {
            if (!authToken) return;

            try {
                const res = await fetch(`${SERVER_URL}/api/schedules`, {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });

                if (res.status === 401) {
                    handleLogout();
                    return;
                }

                const schedules = await res.json();
                renderSchedules(schedules);
            } catch (err) {
                showToast('Failed to fetch schedules');
            }
        }

        function renderSchedules(schedules) {
            const container = document.getElementById('schedule-container');
            container.innerHTML = '';

            if (schedules.length === 0) {
                container.innerHTML = '<p style="grid-column:1/-1; text-align:center; color:var(--text-muted);">No schedules yet</p>';
                return;
            }

            schedules.forEach(item => {
                const card = document.createElement('div');
                card.className = `device-card ${item.isActive ? 'active' : ''}`;
                card.innerHTML = `
                    <div style="display: flex; justify-content: space-between; margin-bottom: 15px;">
                        <div style="font-size: 28px;">⏰</div>
                        <div style="width: 50px; height: 30px; background: ${item.isActive ? '#10b981' : '#999'}; border-radius: 15px; cursor: pointer;" onclick="toggleSchedule('${item._id}', event)"></div>
                    </div>
                    <div style="font-size: 32px; font-weight: 200; color: var(--text-main); letter-spacing: -1px;">${item.time}</div>
                    <div style="font-size: 16px; font-weight: 600; color: var(--text-main); margin-top: 10px;">${item.title}</div>
                    <button onclick="deleteSchedule('${item._id}', event)" style="position: absolute; bottom: 15px; right: 15px; background: var(--danger-light); color: var(--danger); border: none; width: 35px; height: 35px; border-radius: 10px; cursor: pointer; font-size: 14px;">🗑️</button>
                `;
                container.appendChild(card);
            });
        }

        document.getElementById('scheduleForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const time = document.getElementById('inputTime').value;
            const title = document.getElementById('inputTitle').value;
            const audio = document.getElementById('inputAudio').value;

            try {
                const res = await fetch(`${SERVER_URL}/api/schedules`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${authToken}`
                    },
                    body: JSON.stringify({ time, title, audio })
                });

                if (res.ok) {
                    closeModal();
                    showToast('Schedule created');
                    fetchSchedules();
                } else {
                    showToast('Failed to create schedule');
                }
            } catch (err) {
                showToast('Error creating schedule');
            }
        });

        async function toggleSchedule(id, e) {
            e.stopPropagation();
            try {
                const res = await fetch(`${SERVER_URL}/api/schedules/${id}/toggle`, {
                    method: 'PUT',
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });
                if (res.ok) fetchSchedules();
            } catch (err) {}
        }

        async function deleteSchedule(id, e) {
            e.stopPropagation();
            if (!confirm('Delete this schedule?')) return;
            try {
                const res = await fetch(`${SERVER_URL}/api/schedules/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });
                if (res.ok) {
                    showToast('Schedule deleted');
                    fetchSchedules();
                }
            } catch (err) {}
        }

        // ================= 🔔 Sound Control =================
        function forcePlayBell(audio) {
            if (socket && socket.connected) {
                socket.emit('force_play_bell', { audio });
                showToast(`Playing: ${audio}`);
            } else {
                showToast('Not connected to server');
            }
        }

        function stopBell() {
            if (socket && socket.connected) {
                socket.emit('force_stop_bell');
                showToast('Sound stopped');
            }
        }

        // ================= 🎛️ UI Helpers =================
        function switchTab(page, element) {
            document.querySelectorAll('.page-container').forEach(p => p.classList.remove('active'));
            document.getElementById(page).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            element.classList.add('active');
        }

        function openModal() {
            document.getElementById('addModal').classList.add('show');
        }

        function closeModal() {
            document.getElementById('addModal').classList.remove('show');
            document.getElementById('scheduleForm').reset();
        }

        function showToast(msg) {
            const toast = document.getElementById('toastMsg');
            toast.innerText = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function handleLogout() {
            if (confirm('Logout?')) {
                sessionStorage.removeItem('token');
                sessionStorage.removeItem('user');
                authToken = null;
                currentUser = null;
                if (socket) socket.disconnect();
                document.getElementById('app-wrapper').classList.remove('visible');
                document.getElementById('login-wrapper').classList.remove('hidden');
                document.getElementById('authPass').value = '';
                document.getElementById('authOtp').value = '';
            }
        }

        // Close modal on overlay click
        document.getElementById('addModal').addEventListener('click', (e) => {
            if (e.target.id === 'addModal') closeModal();
        });
    </script>
</body>
</html>
