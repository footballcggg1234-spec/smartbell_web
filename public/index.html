<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SmartBell - Control Center</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Premium Light Theme */
            --bg-center: #ffffff; --bg-edge: #fdf6e3;
            --glass-base: rgba(255, 255, 255, 0.5); --glass-card: rgba(255, 255, 255, 0.7);
            --glass-hover: rgba(255, 255, 255, 0.9); --glass-solid: rgba(255, 255, 255, 0.98);
            --border-light: rgba(255, 255, 255, 0.8); --border-highlight: rgba(217, 119, 6, 0.3);
            --primary: #d97706; --primary-grad: linear-gradient(135deg, #f59e0b, #d97706);
            --primary-light: rgba(245, 158, 11, 0.15);
            --text-main: #1c1917; --text-muted: #78716c; 
            --danger: #ef4444; --danger-light: rgba(239, 68, 68, 0.15); --success: #10b981;
            --radius-xl: 32px; --radius-lg: 24px; --radius-md: 16px;
            --shadow-glass: 0 10px 40px rgba(0, 0, 0, 0.05), inset 0 1px 1px rgba(255, 255, 255, 0.8);
            --shadow-hover: 0 20px 50px rgba(217, 119, 6, 0.15), inset 0 1px 1px rgba(255, 255, 255, 1);
            --shadow-btn: 0 10px 25px rgba(217, 119, 6, 0.4);
        }

        [data-theme="dark"] {
            /* God Tier Sci-Fi Dark Theme */
            --bg-center: #1a0b02; --bg-edge: #09090b;
            --glass-base: rgba(15, 15, 15, 0.5); --glass-card: rgba(25, 25, 25, 0.6);
            --glass-hover: rgba(40, 40, 40, 0.8); --glass-solid: rgba(20, 20, 20, 0.98);
            --border-light: rgba(255, 255, 255, 0.08); --border-highlight: rgba(251, 191, 36, 0.4);
            --primary: #fbbf24; --primary-grad: linear-gradient(135deg, #fbbf24, #d97706);
            --primary-light: rgba(245, 158, 11, 0.2);
            --text-main: #f5f5f4; --text-muted: #a8a29e; 
            --shadow-glass: 0 10px 40px rgba(0, 0, 0, 0.5), inset 0 1px 1px rgba(255, 255, 255, 0.05);
            --shadow-hover: 0 20px 50px rgba(245, 158, 11, 0.15), inset 0 1px 1px rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Kanit', sans-serif; -webkit-tap-highlight-color: transparent; transition: background-color 0.4s, border-color 0.4s, color 0.4s, box-shadow 0.4s, transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        body { background-color: var(--bg-edge); color: var(--text-main); width: 100vw; height: 100vh; overflow: hidden; display: flex; position: relative; }
        
        /* Animated Background */
        .amber-bg { position: absolute; inset: 0; z-index: 0; background-image: radial-gradient(100% 150% at 50% 0%, var(--bg-center) 0%, var(--bg-edge) 100%); background-size: 100% 100%; }
        .bg-orb { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.5; z-index: 0; animation: float 15s ease-in-out infinite alternate; }
        .orb-1 { top: -10%; left: -10%; width: 500px; height: 500px; background: #f59e0b; }
        .orb-2 { bottom: -10%; right: -10%; width: 600px; height: 600px; background: #ea580c; animation-delay: -5s; }
        @keyframes float { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(50px, 50px) scale(1.1); } }

        /* Login Card */
        #login-wrapper { position: fixed; inset: 0; z-index: 9999; display: flex; justify-content: center; align-items: center; transition: opacity 0.5s ease, backdrop-filter 0.5s; padding: 20px; backdrop-filter: blur(20px); }
        #login-wrapper.hidden { opacity: 0; visibility: hidden; pointer-events: none; backdrop-filter: blur(0px); }
        .login-card { background: var(--glass-card); backdrop-filter: blur(40px); border: 1px solid var(--border-light); border-radius: var(--radius-xl); padding: 50px 40px; width: 100%; max-width: 440px; text-align: center; box-shadow: var(--shadow-hover); position: relative; overflow: hidden; }
        .login-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: var(--primary-grad); }
        .login-icon { font-size: 48px; color: var(--primary); margin-bottom: 15px; filter: drop-shadow(0 4px 10px var(--primary-light)); }
        .login-title { font-size: 28px; font-weight: 700; color: var(--text-main); margin-bottom: 5px; letter-spacing: -0.5px; }
        .login-subtitle { font-size: 15px; color: var(--text-muted); font-weight: 500; margin-bottom: 35px; }
        .input-group { position: relative; margin-bottom: 16px; }
        .input-group i { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 16px; transition: 0.3s; }
        .login-input { width: 100%; padding: 18px 20px 18px 50px; background: var(--glass-base); border: 1px solid var(--border-light); border-radius: var(--radius-md); outline: none; font-size: 15px; color: var(--text-main); font-weight: 500; }
        .login-input:focus { border-color: var(--primary); background: var(--glass-solid); box-shadow: 0 0 0 4px var(--primary-light); }
        .login-input:focus + i, .input-group:focus-within i { color: var(--primary); }
        
        .otp-row { display: flex; gap: 12px; margin-bottom: 16px; }
        .otp-btn { background: var(--glass-solid); color: var(--primary); border: 1px solid var(--primary); padding: 0 20px; border-radius: var(--radius-md); font-weight: 600; cursor: pointer; min-width: 120px; }
        .otp-btn:hover { background: var(--primary); color: white; }
        
        .login-btn { width: 100%; background: var(--primary-grad); color: white; border: none; padding: 18px; border-radius: 100px; font-weight: 600; font-size: 16px; cursor: pointer; margin-top: 15px; box-shadow: var(--shadow-btn); text-transform: uppercase; letter-spacing: 1px; }
        .login-btn:hover { transform: translateY(-3px); box-shadow: 0 15px 35px rgba(217, 119, 6, 0.5); }
        .login-btn:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }
        .toggle-auth { margin-top: 25px; font-size: 14px; color: var(--text-muted); }
        .toggle-auth a { color: var(--primary); font-weight: 600; cursor: pointer; text-decoration: none; padding: 5px 10px; border-radius: 8px; transition: 0.3s; }
        .toggle-auth a:hover { background: var(--primary-light); }

        /* App Layout */
        #app-wrapper { position: relative; z-index: 1; display: flex; width: 100%; height: 100%; opacity: 0; visibility: hidden; transition: opacity 0.6s ease; }
        #app-wrapper.visible { opacity: 1; visibility: visible; }
        .sidebar { width: 280px; background: var(--glass-base); height: 100vh; display: flex; flex-direction: column; padding: 40px 24px; border-right: 1px solid var(--border-light); backdrop-filter: blur(40px); z-index: 10; }
        .main-wrapper { flex-grow: 1; height: 100vh; overflow-y: auto; z-index: 10; position: relative; }
        .main-wrapper::-webkit-scrollbar { width: 8px; }
        .main-wrapper::-webkit-scrollbar-thumb { background: var(--border-highlight); border-radius: 4px; }

        .brand-logo { font-size: 26px; font-weight: 700; color: var(--text-main); margin-bottom: 50px; display: flex; align-items: center; gap: 12px; }
        .brand-logo i { color: var(--primary); filter: drop-shadow(0 2px 5px var(--primary-light)); }
        
        .sidebar-nav { display: flex; flex-direction: column; gap: 10px; margin-bottom: auto; }
        .nav-item { display: flex; align-items: center; gap: 16px; padding: 16px 20px; border-radius: 20px; color: var(--text-muted); font-weight: 500; cursor: pointer; border: 1px solid transparent; }
        .nav-item:hover { background: var(--glass-card); color: var(--primary); transform: translateX(5px); }
        .nav-item.active { background: var(--glass-solid); color: var(--primary); border-color: var(--border-highlight); box-shadow: var(--shadow-glass); font-weight: 600; }

        .page-container { padding: 50px 60px; display: none; animation: fadeIn 0.5s ease; }
        .page-container.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .section-title { font-size: 28px; font-weight: 700; color: var(--text-main); margin-bottom: 30px; letter-spacing: -0.5px; display: flex; align-items: center; gap: 10px; }
        
        .device-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px; }
        .device-card { background: var(--glass-card); backdrop-filter: blur(30px); border-radius: var(--radius-xl); padding: 30px; box-shadow: var(--shadow-glass); border: 1px solid var(--border-light); cursor: pointer; position: relative; overflow: hidden; }
        .device-card::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: transparent; transition: 0.4s; }
        .device-card:hover { transform: translateY(-5px); background: var(--glass-hover); box-shadow: var(--shadow-hover); }
        .device-card:hover::before { background: var(--primary); }
        .device-card.active { border-color: var(--border-highlight); background: var(--glass-solid); }
        .device-card.active::before { background: var(--success); }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(20px); display: flex; justify-content: center; align-items: center; opacity: 0; visibility: hidden; transition: 0.4s; z-index: 1000; }
        .modal-overlay.show { opacity: 1; visibility: visible; }
        .modal-content { background: var(--glass-solid); backdrop-filter: blur(40px); width: 100%; max-width: 440px; padding: 45px; border-radius: 40px; transform: scale(0.95) translateY(20px); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); border: 1px solid var(--border-light); box-shadow: 0 30px 60px rgba(0,0,0,0.2); }
        .modal-overlay.show .modal-content { transform: scale(1) translateY(0); }

        .toast { position: fixed; top: 40px; left: 50%; transform: translateX(-50%) translateY(-20px); background: rgba(28, 25, 23, 0.95); color: white; padding: 16px 32px; border-radius: 100px; font-size: 15px; font-weight: 500; z-index: 9999; opacity: 0; box-shadow: 0 10px 30px rgba(0,0,0,0.2); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); display: flex; align-items: center; gap: 10px; }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        .theme-toggle { position: absolute; top: 30px; right: 40px; z-index: 100; background: var(--glass-card); border: 1px solid var(--border-light); padding: 10px 15px; border-radius: 100px; cursor: pointer; color: var(--text-main); backdrop-filter: blur(10px); box-shadow: var(--shadow-glass); }
        .theme-toggle:hover { background: var(--glass-hover); color: var(--primary); }

        @media (max-width: 768px) {
            .sidebar { display: none; }
            .page-container { padding: 30px 20px; }
            .device-grid { grid-template-columns: 1fr; }
            .theme-toggle { top: 20px; right: 20px; }
        }
    </style>
</head>
<body>

    <div class="amber-bg"></div>
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>
    
    <button class="theme-toggle" onclick="toggleTheme()"><i class="fa-solid fa-moon theme-icon"></i></button>

    <div class="toast" id="toastMsg"><i class="fa-solid fa-circle-info"></i> <span id="toastText">Message</span></div>

    <div id="login-wrapper">
        <div class="login-card">
            <i class="fa-solid fa-shield-halved login-icon"></i>
            <h2 class="login-title" id="authTitle">SmartBell Pro</h2>
            <p class="login-subtitle" id="authSubtitle">ระบบควบคุมเสียงออดอัจฉริยะ</p>
            
            <form id="authForm">
                <div class="input-group">
                    <input type="text" class="login-input" id="authUser" placeholder="ชื่อผู้ใช้งาน" required>
                    <i class="fa-solid fa-user"></i>
                </div>
                
                <div id="registerFields" style="display: none;">
                    <div class="input-group">
                        <input type="email" class="login-input" id="authEmail" placeholder="อีเมล">
                        <i class="fa-solid fa-envelope"></i>
                    </div>
                    <div class="otp-row">
                        <div class="input-group" style="flex: 1; margin-bottom: 0;">
                            <input type="text" class="login-input" id="authOtp" placeholder="รหัส OTP 6 หลัก" maxlength="6" style="padding-left: 20px;">
                        </div>
                        <button type="button" class="otp-btn" id="btnSendOtp" onclick="sendOTP(event)">รับ OTP</button>
                    </div>
                </div>

                <div class="input-group">
                    <input type="password" class="login-input" id="authPass" placeholder="รหัสผ่าน" required>
                    <i class="fa-solid fa-lock"></i>
                </div>
                <button type="submit" class="login-btn" id="authSubmitBtn">เข้าสู่ระบบ</button>
            </form>
            <p class="toggle-auth">
                <span id="authToggleText">ยังไม่มีบัญชีใช่ไหม?</span> 
                <a onclick="toggleAuthMode()">สมัครสมาชิก</a>
            </p>
        </div>
    </div>

    <div id="app-wrapper">
        <div class="sidebar">
            <div class="brand-logo"><i class="fa-solid fa-bell"></i> SmartBell</div>
            <div class="sidebar-nav">
                <div class="nav-item active" onclick="switchTab('page-home', this)"><i class="fa-solid fa-gauge-high"></i> Dashboard</div>
                <div class="nav-item" onclick="switchTab('page-schedules', this)"><i class="fa-solid fa-calendar-check"></i> Schedules</div>
                <div class="nav-item" onclick="switchTab('page-settings', this)"><i class="fa-solid fa-sliders"></i> Settings</div>
            </div>
            <div style="padding: 25px; background: var(--glass-card); border-radius: 24px; text-align: center; border: 1px solid var(--border-light); box-shadow: var(--shadow-glass);">
                <div style="width: 50px; height: 50px; background: var(--primary-light); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--primary); font-size: 20px; margin: 0 auto 10px;">
                    <i class="fa-solid fa-user-astronaut"></i>
                </div>
                <div style="font-size: 18px; font-weight: 700; color: var(--text-main);" id="displayUser">User</div>
                <div style="font-size: 13px; color: var(--success); margin-top: 5px; font-weight: 500;"><i class="fa-solid fa-circle" style="font-size:8px;"></i> Online Status</div>
                <button onclick="handleLogout()" style="width: 100%; margin-top: 20px; padding: 12px; background: var(--danger-light); color: var(--danger); border: none; border-radius: 14px; cursor: pointer; font-weight: 600; transition: 0.3s;"><i class="fa-solid fa-arrow-right-from-bracket"></i> ออกจากระบบ</button>
            </div>
        </div>

        <div class="main-wrapper">
            <div class="page-container active" id="page-home">
                <h3 class="section-title"><i class="fa-solid fa-bolt text-primary"></i> Quick Control</h3>
                <div class="device-grid">
                    <div class="device-card" onclick="forcePlayBell('08.30.mp3')">
                        <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px;">
                            <div style="width: 60px; height: 60px; background: var(--primary-light); color: var(--primary); border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 28px;">
                                <i class="fa-solid fa-play"></i>
                            </div>
                        </div>
                        <div style="font-size: 20px; font-weight: 700; color: var(--text-main);">Play Test Sound</div>
                        <div style="font-size: 14px; color: var(--text-muted); margin-top: 5px;">ทดสอบส่งเสียงออดทันที</div>
                    </div>
                    <div class="device-card" onclick="stopBell()">
                        <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px;">
                            <div style="width: 60px; height: 60px; background: var(--danger-light); color: var(--danger); border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 28px;">
                                <i class="fa-solid fa-stop"></i>
                            </div>
                        </div>
                        <div style="font-size: 20px; font-weight: 700; color: var(--text-main);">Emergency Stop</div>
                        <div style="font-size: 14px; color: var(--text-muted); margin-top: 5px;">ระงับเสียงออดฉุกเฉิน</div>
                    </div>
                </div>
            </div>

            <div class="page-container" id="page-schedules">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; flex-wrap: wrap; gap: 15px;">
                    <h3 class="section-title" style="margin-bottom: 0;"><i class="fa-solid fa-clock-rotate-left text-primary"></i> Automations</h3>
                    <button class="login-btn" style="width: auto; margin-top: 0; padding: 12px 24px; border-radius: 14px;" onclick="openModal()"><i class="fa-solid fa-plus"></i> Add Schedule</button>
                </div>
                <div class="device-grid" id="schedule-container"></div>
            </div>

            <div class="page-container" id="page-settings">
                <h3 class="section-title"><i class="fa-solid fa-gear text-primary"></i> Settings</h3>
                <div style="background: var(--glass-card); padding: 40px; border-radius: var(--radius-xl); border: 1px solid var(--border-light); box-shadow: var(--shadow-glass); text-align: center;">
                    <i class="fa-solid fa-screwdriver-wrench" style="font-size: 48px; color: var(--text-muted); margin-bottom: 20px; opacity: 0.5;"></i>
                    <div style="color: var(--text-muted); font-size: 18px; font-weight: 500;">ระบบการตั้งค่ากำลังพัฒนา...</div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="addModal">
        <div class="modal-content">
            <h3 style="font-size: 26px; font-weight: 700; margin-bottom: 30px; color: var(--text-main); text-align: center;">New Schedule</h3>
            <form id="scheduleForm">
                <div class="input-group">
                    <input type="time" class="login-input" id="inputTime" required style="padding-left: 20px;">
                </div>
                <div class="input-group">
                    <input type="text" class="login-input" id="inputTitle" required placeholder="ชื่อรายการ (เช่น เวลาพักเบรก)">
                    <i class="fa-solid fa-pen"></i>
                </div>
                <div class="input-group" style="margin-bottom: 30px;">
                    <select class="login-input" id="inputAudio" style="padding-left: 50px;">
                        <option value="08.30.mp3">Morning Bell (08:30)</option>
                        <option value="12.00.mp3">Lunch Bell (12:00)</option>
                    </select>
                    <i class="fa-solid fa-music"></i>
                </div>
                <button type="submit" class="login-btn" style="width: 100%; padding: 18px;"><i class="fa-solid fa-check"></i> Create Schedule</button>
            </form>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        // ================= 🌙 Theme System =================
        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateThemeIcons(newTheme);
        }
        function updateThemeIcons(theme) {
            document.querySelectorAll('.theme-icon').forEach(i => i.className = theme === 'dark' ? 'fa-solid fa-sun theme-icon' : 'fa-solid fa-moon theme-icon');
        }
        const savedTheme = localStorage.getItem('theme') || 'dark'; // เปลี่ยน Default เป็น Dark Mode
        document.documentElement.setAttribute('data-theme', savedTheme);
        updateThemeIcons(savedTheme);

        // ⚠️ ตัวแปร Global (คงเดิม)
        const SERVER_URL = window.location.origin; 
        let currentUser = null;
        let authToken = null;
        let socket = null;
        let isLoginMode = true;

        // ================= 🔐 Auth System (คงเดิม) =================
        function toggleAuthMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('authTitle').innerText = isLoginMode ? 'SmartBell Pro' : 'สร้างบัญชีผู้ใช้งาน';
            document.getElementById('authSubtitle').innerText = isLoginMode ? 'ระบบควบคุมเสียงออดอัจฉริยะ' : 'สมัครสมาชิกใหม่เพื่อเริ่มควบคุมระบบ';
            document.getElementById('authSubmitBtn').innerText = isLoginMode ? 'เข้าสู่ระบบ' : 'สมัครสมาชิก';
            document.getElementById('authToggleText').innerText = isLoginMode ? 'ยังไม่มีบัญชีใช่ไหม?' : 'มีบัญชีอยู่แล้ว?';
            document.querySelector('.toggle-auth a').innerText = isLoginMode ? 'สมัครสมาชิก' : 'เข้าสู่ระบบ';
            document.getElementById('registerFields').style.display = isLoginMode ? 'none' : 'block';
        }

        async function sendOTP(e) {
            e.preventDefault();
            const user = document.getElementById('authUser').value;
            const email = document.getElementById('authEmail').value;
            if (!user || !email) return showToast('Please fill username and email');

            const btn = e.target;
            btn.disabled = true;
            btn.innerText = 'Sending...';

            try {
                const res = await fetch(`${SERVER_URL}/api/auth/send-otp`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, email })
                });
                const data = await res.json();
                showToast(data.message);

                if (data.success) {
                    let timer = 60;
                    const countdown = setInterval(() => {
                        btn.innerText = `Resend (${timer}s)`;
                        timer--;
                        if (timer < 0) {
                            clearInterval(countdown);
                            btn.innerText = 'รับ OTP';
                            btn.disabled = false;
                        }
                    }, 1000);
                } else {
                    btn.disabled = false;
                    btn.innerText = 'รับ OTP';
                }
            } catch (err) {
                showToast('Failed to send OTP');
                btn.disabled = false;
                btn.innerText = 'รับ OTP';
            }
        }

        document.getElementById('authForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const user = document.getElementById('authUser').value;
            const pass = document.getElementById('authPass').value;
            const email = document.getElementById('authEmail').value;
            const otp = document.getElementById('authOtp').value;

            const endpoint = isLoginMode ? '/api/auth/login' : '/api/auth/register';
            const payload = isLoginMode 
                ? { username: user, password: pass }
                : { username: user, email, password: pass, otp };

            const btn = document.getElementById('authSubmitBtn');
            const originalText = btn.innerText;
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Processing...';

            try {
                const res = await fetch(`${SERVER_URL}${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await res.json();

                if (data.success) {
                    if (isLoginMode) {
                        authToken = data.token;
                        currentUser = data.user;
                        sessionStorage.setItem('token', authToken);
                        sessionStorage.setItem('user', JSON.stringify(currentUser));
                        showToast('Login successful!');
                        setTimeout(() => initApp(), 800);
                    } else {
                        showToast('Registration successful! Please login');
                        setTimeout(() => toggleAuthMode(), 1500);
                    }
                } else {
                    showToast(data.message);
                }
            } catch (err) {
                showToast('Server connection failed');
            } finally {
                btn.disabled = false;
                btn.innerText = originalText;
            }
        });

        // ================= 🔌 App Initialization (คงเดิม) =================
        function initApp() {
            document.getElementById('login-wrapper').classList.add('hidden');
            document.getElementById('app-wrapper').classList.add('visible');
            document.getElementById('displayUser').innerText = currentUser.username;

            socket = io(SERVER_URL, {
                auth: { token: authToken },
                reconnection: true,
                reconnectionDelay: 1000,
                reconnectionAttempts: 5
            });

            socket.on('connect', () => {
                console.log('✅ Socket.io connected');
                showToast('Connected to server');
            });

            socket.on('schedule_updated', () => {
                console.log('📅 Schedules updated');
                fetchSchedules();
            });

            socket.on('disconnect', () => {
                console.log('❌ Socket.io disconnected');
            });

            socket.on('error', (error) => {
                console.error('Socket error:', error);
                showToast('Connection error: ' + error);
            });

            fetchSchedules();
        }

        document.addEventListener('DOMContentLoaded', () => {
            const token = sessionStorage.getItem('token');
            const user = sessionStorage.getItem('user');
            if (token && user) {
                authToken = token;
                currentUser = JSON.parse(user);
                initApp();
            }
        });

        // ================= 📅 Schedule Management (แก้ UI Render) =================
        async function fetchSchedules() {
            if (!authToken) return;
            try {
                const res = await fetch(`${SERVER_URL}/api/schedules`, {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });
                if (res.status === 401) { handleLogout(); return; }
                const schedules = await res.json();
                renderSchedules(schedules);
            } catch (err) { showToast('Failed to fetch schedules'); }
        }

        function renderSchedules(schedules) {
            const container = document.getElementById('schedule-container');
            container.innerHTML = '';
            if (schedules.length === 0) {
                container.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding: 40px; background: var(--glass-card); border-radius: var(--radius-xl); border: 1px dashed var(--border-highlight); color: var(--text-muted);"><i class="fa-regular fa-calendar-xmark" style="font-size: 40px; margin-bottom: 15px; opacity: 0.5;"></i><br>ยังไม่มีตารางเวลา</div>';
                return;
            }
            schedules.forEach(item => {
                const card = document.createElement('div');
                card.className = `device-card ${item.isActive ? 'active' : ''}`;
                card.innerHTML = `
                    <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px;">
                        <div style="width: 50px; height: 50px; background: ${item.isActive ? 'var(--success)' : 'var(--glass-solid)'}; color: ${item.isActive ? 'white' : 'var(--text-muted)'}; border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 24px; transition: 0.4s;">
                            <i class="fa-regular fa-clock"></i>
                        </div>
                        <div style="width: 54px; height: 30px; background: ${item.isActive ? 'var(--success)' : 'var(--glass-solid)'}; border: 1px solid ${item.isActive ? 'transparent' : 'var(--border-highlight)'}; border-radius: 20px; cursor: pointer; position: relative; transition: 0.4s;" onclick="toggleSchedule('${item._id}', event)">
                            <div style="position: absolute; top: 3px; left: ${item.isActive ? '27px' : '3px'}; width: 22px; height: 22px; background: ${item.isActive ? 'white' : 'var(--text-muted)'}; border-radius: 50%; transition: 0.3s; box-shadow: 0 2px 5px rgba(0,0,0,0.2);"></div>
                        </div>
                    </div>
                    <div style="font-size: 38px; font-weight: 300; color: var(--text-main); letter-spacing: -2px; line-height: 1.1;">${item.time}</div>
                    <div style="font-size: 16px; font-weight: 500; color: var(--text-muted); margin-top: 5px;">${item.title}</div>
                    <button onclick="deleteSchedule('${item._id}', event)" style="position: absolute; bottom: 20px; right: 20px; background: var(--danger-light); color: var(--danger); border: none; width: 40px; height: 40px; border-radius: 12px; cursor: pointer; font-size: 16px; transition: 0.3s; display: flex; align-items: center; justify-content: center;">
                        <i class="fa-solid fa-trash-can"></i>
                    </button>
                `;
                container.appendChild(card);
            });
        }

        document.getElementById('scheduleForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const time = document.getElementById('inputTime').value;
            const title = document.getElementById('inputTitle').value;
            const audio = document.getElementById('inputAudio').value;
            try {
                const res = await fetch(`${SERVER_URL}/api/schedules`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${authToken}` },
                    body: JSON.stringify({ time, title, audio })
                });
                if (res.ok) { closeModal(); showToast('Schedule created'); fetchSchedules(); } 
                else { showToast('Failed to create schedule'); }
            } catch (err) { showToast('Error creating schedule'); }
        });

        async function toggleSchedule(id, e) {
            e.stopPropagation();
            try {
                const res = await fetch(`${SERVER_URL}/api/schedules/${id}/toggle`, {
                    method: 'PUT', headers: { 'Authorization': `Bearer ${authToken}` }
                });
                if (res.ok) fetchSchedules();
            } catch (err) {}
        }

        async function deleteSchedule(id, e) {
            e.stopPropagation();
            if (!confirm('ยืนยันการลบตารางเวลานี้?')) return;
            try {
                const res = await fetch(`${SERVER_URL}/api/schedules/${id}`, {
                    method: 'DELETE', headers: { 'Authorization': `Bearer ${authToken}` }
                });
                if (res.ok) { showToast('Schedule deleted'); fetchSchedules(); }
            } catch (err) {}
        }

        // ================= 🔔 Sound Control (คงเดิม) =================
        function forcePlayBell(audio) {
            if (socket && socket.connected) { socket.emit('force_play_bell', { audio }); showToast(`Playing: ${audio}`); } 
            else { showToast('Not connected to server'); }
        }
        function stopBell() {
            if (socket && socket.connected) { socket.emit('force_stop_bell'); showToast('Sound stopped'); }
        }

        // ================= 🎛️ UI Helpers =================
        function switchTab(page, element) {
            document.querySelectorAll('.page-container').forEach(p => p.classList.remove('active'));
            document.getElementById(page).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            element.classList.add('active');
        }
        function openModal() { document.getElementById('addModal').classList.add('show'); }
        function closeModal() { document.getElementById('addModal').classList.remove('show'); document.getElementById('scheduleForm').reset(); }
        function showToast(msg) {
            const toast = document.getElementById('toastMsg'); 
            document.getElementById('toastText').innerText = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
        function handleLogout() {
            if (confirm('ยืนยันการออกจากระบบ?')) {
                sessionStorage.removeItem('token'); sessionStorage.removeItem('user');
                authToken = null; currentUser = null;
                if (socket) socket.disconnect();
                document.getElementById('app-wrapper').classList.remove('visible');
                document.getElementById('login-wrapper').classList.remove('hidden');
                document.getElementById('authPass').value = ''; document.getElementById('authOtp').value = '';
            }
        }
        document.getElementById('addModal').addEventListener('click', (e) => { if (e.target.id === 'addModal') closeModal(); });
    </script>
</body>
</html>
